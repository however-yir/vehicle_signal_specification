name: Quarterly Upstream Sync

on:
  schedule:
    - cron: "0 3 1 */3 *"
  workflow_dispatch:

jobs:
  sync-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add upstream remote if missing
        run: |
          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream https://github.com/COVESA/vehicle_signal_specification.git
          fi

      - name: Generate sync report
        run: ./scripts/quarterly_upstream_sync.sh

      - name: Upload sync report
        uses: actions/upload-artifact@v7
        with:
          name: upstream-sync-report
          path: reports/upstream-sync-*.md
